<!DOCTYPE html>
<html>
<head>
<title>Profile Card</title>
<style>
body{
    background-color:#f2f2f2;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
p{
    font-size:24px;
    font-weight:bold;
    position: relative;
    top:20px;
}
h2{
    margin:20px 0;
    color:blue
}
.card{
    background:white;
    width:300px;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0px 4px 10px rgba(0,0,0,0.2);
}
.card img{
    width:120px;
    height:120px;
    border-radius:50%;
}
.stat{
    font-size:20px;
    margin:10px;
    font-weight:bold;
}
.runs{
    color:green;
}
.sr{
    color:blue;
}
</style>
</head>
<body>
<div class="card">
<img src="rohit sharma.jpg" alt="Rohit Sharma">
<h2>Rohit Sharma</h2>
<p>Cricketer</p>
<h3>Player Statistics</h3>
<div class="stat runs">
Runs: 3450
</div>
<div class="stat sr">
Strike Rate: 145.3
</div>
<p>
Waiting for next world cup. Dominating the cricket world with his exceptional batting skills.
</p>
</div>
</body>
</html>
