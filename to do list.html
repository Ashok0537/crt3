<!DOCTYPE html>
<html>
<head>
<title>To Do List</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
}

.container{
    width:350px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
}

ul{
    padding:0;
}

li{
    list-style:none;
    padding:10px;
    border-bottom:1px solid #ddd;
}

input[type="checkbox"]{
    margin-right:10px;
}

input:checked + label{
    text-decoration: line-through;
    color: gray;
}

</style>

</head>

<body>

<div class="container">

<h2>My To Do List</h2>

<ul>

<li>
<input type="checkbox" id="task1">
<label for="task1">Study Embedded Systems</label>
</li>

<li>
<input type="checkbox" id="task2">
<label for="task2">afternoon work</label>
</li>

<li>
<input type="checkbox" id="task3">
<label for="task3">evening program assignment</label>
</li>

<li>
<input type="checkbox" id="task4">
<label for="task4">Practice Programming</label>
</li>

</ul>

</div>

</body>
</html>
